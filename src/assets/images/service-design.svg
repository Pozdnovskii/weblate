<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" class="service-icon">
  <defs>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1" />
      <stop offset="100%" stop-color="#A855F7" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect x="20" y="30" width="160" height="140" rx="12" stroke="url(#mainGrad)" stroke-width="2.5" 
        pathLength="100" stroke-dasharray="100" stroke-dashoffset="100">
    <animate attributeName="stroke-dashoffset" from="100" to="0" dur="0.8s" fill="freeze" begin="indefinite" data-delay="0"/>
  </rect>

  <g opacity="0">
    <circle cx="45" cy="50" r="3.5" fill="#6366F1" />
    <circle cx="60" cy="50" r="3.5" fill="#A855F7" />
    <animate attributeName="opacity" from="0" to="1" dur="0.4s" fill="freeze" begin="indefinite" data-delay="0.5"/>
  </g>

  <g stroke="url(#mainGrad)" stroke-width="3" stroke-linecap="round" filter="url(#glow)">
    <path d="M45 85 l-8 8 l8 8" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100">
      <animate attributeName="stroke-dashoffset" from="100" to="0" dur="0.4s" fill="freeze" begin="indefinite" data-delay="0.8"/>
    </path>
    <path d="M65 82 l-10 22" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100">
      <animate attributeName="stroke-dashoffset" from="100" to="0" dur="0.4s" fill="freeze" begin="indefinite" data-delay="1.0"/>
    </path>
    <path d="M72 85 l8 8 l-8 8" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100">
      <animate attributeName="stroke-dashoffset" from="100" to="0" dur="0.4s" fill="freeze" begin="indefinite" data-delay="1.2"/>
    </path>
  </g>

  <g fill="url(#mainGrad)" filter="url(#glow)">
    <rect x="110" y="75" width="55" height="35" rx="4" opacity="0">
      <animate attributeName="opacity" from="0" to="0.7" dur="0.5s" fill="freeze" begin="indefinite" data-delay="1.5"/>
      <animateTransform attributeName="transform" type="translate" from="10 0" to="0 0" dur="0.5s" fill="freeze" begin="indefinite" data-delay="1.5"/>
    </rect>
    <rect x="110" y="120" width="40" height="6" rx="3" opacity="0">
      <animate attributeName="opacity" from="0" to="0.5" dur="0.4s" fill="freeze" begin="indefinite" data-delay="1.7"/>
    </rect>
    <rect x="110" y="135" width="25" height="6" rx="3" opacity="0">
      <animate attributeName="opacity" from="0" to="0.3" dur="0.4s" fill="freeze" begin="indefinite" data-delay="1.8"/>
    </rect>
  </g>

  <rect x="38" y="145" width="10" height="3" fill="#6366F1" opacity="0">
    <animate attributeName="opacity" values="0;1;0" dur="1s" repeatCount="indefinite" begin="indefinite" data-delay="2.0"/>
  </rect>
</svg>